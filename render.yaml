services:
  - type: web
    name: syncra-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: syncra-db
          property: connectionString
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: syncra-db
    plan: free
